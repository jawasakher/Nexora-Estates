<svg width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title {
      font-family: 'Segoe UI', sans-serif;
      font-size: 42px;
      font-weight: 600;
      fill: #111;
      letter-spacing: 1px;
    }
    .subtitle {
      font-family: 'Segoe UI', sans-serif;
      font-size: 16px;
      fill: #777;
      letter-spacing: 4px;
    }
    .icon {
      fill: none;
      stroke: #C9A14A;
      stroke-width: 2;
    }
  </style>

  <!-- Icon (Modern Building) -->
  <g transform="translate(40,40)">
    <rect x="0" y="40" width="20" height="60" class="icon"/>
    <rect x="25" y="20" width="20" height="80" class="icon"/>
    <rect x="50" y="0" width="20" height="100" class="icon"/>
  </g>

  <!-- Brand Name -->
  <text x="140" y="90" class="title">Nexora</text>
  <text x="140" y="120" class="subtitle">ESTATES</text>
</svg>